services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - DB_URI=mongodb://mongodb:27017/JBTEST?replicaSet=rs0
    env_file: .env.development.local
    depends_on:
      - mongodb
      - mongo-init
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  mongodb:
    image: mongo:5.0
    ports:
      - "27017:27017"
    command: mongod --replSet rs0 --quiet
    volumes:
      - mongodb_data:/data/db
    logging:
      driver: "none"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:5.0
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      mongosh mongodb:27017 --eval "
        rs.initiate({
          _id: 'rs0',
          members: [
            { _id: 0, host: 'mongodb:27017' }
          ]
        })
      "
    logging:
      driver: "none"

volumes:
  mongodb_data: